<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favicon Preview</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    img {
      width: min(92vmin, 92%);
      height: min(92vmin, 92%);
      display: block;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <img src="../assets/images/favicon.svg" alt="SlabWay favicon preview">
</body>
</html>
